<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>สต็อก — Douceur</title>
  <link rel="stylesheet" href="assets/css/style.css"/>
</head>
<body>
<div class="layout" id="app-shell"></div>
<div id="toast"></div>

<script src="assets/js/utils.js"></script>
<script src="assets/js/shell.js"></script>
<script>
renderShell();

let currentType = 'IN';
let products = [];

async function init() {
  const pc = document.getElementById('page-content');

  // load products for dropdown
  try {
    products = await apiFetch('/products');
  } catch (e) {
    showToast(e.message, 'error');
  }

  const options = products.map(p =>
    `<option value="${p.id}">${p.name} (สต็อก: ${p.current_stock})</option>`
  ).join('');

  pc.innerHTML = `
    <div class="page-header">
      <span class="page-title">จัดการสต็อก</span>
      <div class="type-toggle">
        <button class="tgl in on" id="btn-in"  onclick="setType('IN')">+ รับเข้า</button>
        <button class="tgl out"   id="btn-out" onclick="setType('OUT')">− จ่ายออก</button>
      </div>
    </div>

    <div class="form-box">
      <div class="form-row col3">
        <div class="field">
          <label>สินค้า</label>
          <select id="f-product">${options}</select>
        </div>
        <div class="field">
          <label>จำนวน</label>
          <input id="f-qty" type="number" min="1" value="1" placeholder="0"/>
        </div>
        <div class="field">
          <label>วันที่</label>
          <input id="f-date" type="date" value="${new Date().toISOString().slice(0,10)}"/>
        </div>
      </div>
      <div class="field" style="margin-bottom:12px;">
        <label>หมายเหตุ</label>
        <textarea id="f-note" placeholder="เช่น รับจากซัพพลายเออร์, ตัดสต็อกเสีย..."></textarea>
      </div>
      <div class="form-actions">
        <button class="btn-green" id="btn-submit" onclick="submitInventory()">บันทึกรับเข้า</button>
      </div>
    </div>

    <div class="section-header">
      <span class="section-title">รายการล่าสุด</span>
    </div>
    <div id="log-list"><div class="loading">กำลังโหลด...</div></div>`;

  loadLogs();
}

function setType(t) {
  currentType = t;
  document.getElementById('btn-in').className  = 'tgl in'  + (t === 'IN'  ? ' on' : '');
  document.getElementById('btn-out').className = 'tgl out' + (t === 'OUT' ? ' on' : '');
  document.getElementById('btn-submit').className = t === 'IN' ? 'btn-green' : 'btn-red';
  document.getElementById('btn-submit').textContent = t === 'IN' ? 'บันทึกรับเข้า' : 'บันทึกจ่ายออก';
}

async function submitInventory() {
  const body = {
    product_id: document.getElementById('f-product').value,
    type:       currentType,
    quantity:   parseInt(document.getElementById('f-qty').value) || 0,
    note:       document.getElementById('f-note').value.trim(),
    date:       document.getElementById('f-date').value,
  };
  if (!body.quantity || body.quantity < 1) return showToast('กรุณากรอกจำนวน', 'error');

  try {
    await apiFetch('/inventory', { method: 'POST', body: JSON.stringify(body) });
    showToast(currentType === 'IN' ? 'บันทึกรับเข้าเรียบร้อย' : 'บันทึกจ่ายออกเรียบร้อย');
    document.getElementById('f-qty').value = '1';
    document.getElementById('f-note').value = '';
    loadLogs();
  } catch (e) {
    showToast(e.message, 'error');
  }
}

async function loadLogs() {
  const el = document.getElementById('log-list');
  if (!el) return;
  try {
    const logs = await apiFetch('/inventory');
    if (logs.length === 0) {
      el.innerHTML = '<div class="empty">ยังไม่มีรายการ</div>';
      return;
    }
    el.innerHTML = logs.slice(0, 30).map(l => `
      <div class="log-item">
        <div class="log-badge ${l.type === 'IN' ? 'in' : 'out'}">${l.type}</div>
        <div class="log-info">
          <div class="log-name">${l.product_name}</div>
          <div class="log-meta">${l.note || '—'}</div>
        </div>
        <div>
          <div class="log-qty ${l.type === 'IN' ? 'in' : 'out'}">${l.type === 'IN' ? '+' : '-'}${l.quantity}</div>
          <div class="log-time">${formatDate(l.date)}</div>
        </div>
      </div>`).join('');
  } catch (e) {
    el.innerHTML = `<div class="empty">${e.message}</div>`;
  }
}

init();
</script>
</body>
</html>
